<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ретро Радіо Плеєр</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-layout">
        <!-- ЛІВА ЧАСТИНА: Анімоване Радіо -->
        <div class="radio-visual-box">
            <div class="retro-radio-body" id="radio-body">
                <div class="radio-antenna"></div>
                <div class="radio-speaker-left"></div>
                <div class="radio-speaker-right"></div>
                <div class="radio-handle"></div>
            </div>
        </div>

        <!-- ЦЕНТР: Екран та керування -->
        <div class="radio-container">
            <div class="radio-screen">
                <div class="noise-overlay"></div>
                <div class="screen-info">
                    <h1 id="track-title">Оберіть хвилю</h1>
                    <p id="track-status">Радіо вимкнено</p>
                </div>
            </div>

            <div class="search-box">
                <!-- Сюди пишемо назву радіо (напр. Kiss, Hit, Rock) -->
                <input type="text" id="search-input" placeholder="Введіть назву (Kiss, Hit, Rock, Jazz)...">
                <button id="play-btn">Увімкнути радіохвилю</button>
            </div>

            <div class="controls">
                <label for="noise-volume">Рівень перешкод радіо:</label>
                <input type="range" id="noise-volume" min="0" max="1" step="0.1" value="0.3">
            </div>
            
            <button id="add-to-playlist">Додати до плейлиста</button>
        </div>

        <!-- ПРАВА ЧАСТИНА: Плейлист -->
        <div class="playlist-section">
            <h3>Мій Плейлист</h3>
            <ul id="playlist-items"></ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
